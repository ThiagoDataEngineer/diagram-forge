name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: npm audit (production deps)
        run: npm audit --audit-level=high --production
        continue-on-error: true  # gifsicle chain — tracked separately

      - name: TypeScript type check
        run: npx tsc --noEmit
